name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME_API: api-beamlab
  AZURE_WEBAPP_NAME_PYTHON: api-beamlab-python
  NODE_VERSION: '18.x'
  PYTHON_VERSION: '3.12'

jobs:
  # Build and deploy Node.js API
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build API
        working-directory: apps/api
        run: npm run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy-api
          cp -r apps/api/dist deploy-api/
          cp apps/api/package.json deploy-api/
          cp package-lock.json deploy-api/
          cd deploy-api && npm ci --omit=dev --ignore-scripts
          zip -r ../api-app.zip .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME_API }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_API }}
          package: api-app.zip

  # Build and deploy Python Engine
  deploy-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: apps/backend-python/requirements.txt

      - name: Install dependencies
        working-directory: apps/backend-python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create zip package
        working-directory: apps/backend-python
        run: zip -r ../../python-app.zip .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME_PYTHON }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PYTHON }}
          package: python-app.zip
