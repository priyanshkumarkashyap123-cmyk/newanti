name: Deploy to Azure

# Temporarily re-enabled for public repo deployment
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-azure-${{ github.ref }}
  cancel-in-progress: false

env:
  AZURE_RESOURCE_GROUP: beamlab-ci-rg
  AZURE_WEBAPP_NAME_API: beamlab-backend-node
  AZURE_WEBAPP_NAME_PYTHON: beamlab-backend-python
  NODE_VERSION: '20.x'
  PYTHON_VERSION: '3.11'

jobs:
  # Build and deploy Node.js API
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build API
        working-directory: apps/api
        run: pnpm run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy-api
          cp -r apps/api/dist deploy-api/
          cp apps/api/web.config deploy-api/
          # Create a deployment-specific package.json without build script
          node -e "
            const pkg = require('./apps/api/package.json');
            delete pkg.scripts.build;
            delete pkg.devDependencies;
            pkg.scripts.start = 'node dist/index.js';
            pkg.main = 'dist/index.js';
            console.log(JSON.stringify(pkg, null, 2));
          " > deploy-api/package.json
          cd deploy-api && npm install --omit=dev --ignore-scripts

      - name: Create environment file
        run: |
          cat > deploy-api/.env << EOF
          PHONEPE_MERCHANT_ID=${{ secrets.PHONEPE_MERCHANT_ID }}
          PHONEPE_SALT_KEY=${{ secrets.PHONEPE_SALT_KEY }}
          PHONEPE_SALT_INDEX=${{ secrets.PHONEPE_SALT_INDEX }}
          PHONEPE_ENV=PRODUCTION
          NODE_ENV=production
          PORT=8080
          USE_CLERK=true
          FRONTEND_URL=https://beamlabultimate.tech
          CORS_ALLOWED_ORIGINS=https://beamlabultimate.tech,https://www.beamlabultimate.tech,https://brave-mushroom-0eae8ec00.4.azurestaticapps.net
          MONGODB_URI=${{ secrets.MONGODB_URI }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
          CLERK_PUBLISHABLE_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
          PYTHON_BACKEND_URL=https://beamlab-backend-python.azurewebsites.net
          RUST_BACKEND_URL=https://beamlab-rust-api.azurewebsites.net
          EOF
      - name: Create API zip package
        run: |
          cd deploy-api
          zip -r ../api-app.zip .

      - name: Deploy to Azure Web App (publish profile)
        id: deploy_api_publish_profile
        continue-on-error: true
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME_API }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_API }}
          package: api-app.zip

      - name: Azure login for API fallback deploy
        id: api_fallback_login
        if: steps.deploy_api_publish_profile.outcome != 'success'
        continue-on-error: true
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy API via Azure CLI fallback
        id: deploy_api_cli_fallback
        if: steps.deploy_api_publish_profile.outcome != 'success' && steps.api_fallback_login.outcome == 'success'
        continue-on-error: true
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp deploy \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --name "${{ env.AZURE_WEBAPP_NAME_API }}" \
              --src-path api-app.zip \
              --type zip \
              --clean true

      - name: Fail with actionable API deployment guidance
        if: steps.deploy_api_publish_profile.outcome != 'success' && steps.deploy_api_cli_fallback.outcome != 'success'
        run: |
          echo "::error::API deployment failed via both publish-profile and Azure CLI fallback."
          echo "::error::Rotate AZURE_WEBAPP_PUBLISH_PROFILE_API and verify AZURE_CREDENTIALS has Contributor on ${{ env.AZURE_RESOURCE_GROUP }}."
          exit 1

      - name: Verify Node API health post-deploy
        run: |
          echo "Waiting 20s for service warm-up..."
          sleep 20
          for i in 1 2 3 4 5; do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://beamlab-backend-node.azurewebsites.net/health || echo "000")
            echo "Attempt $i: Node API → $status"
            [ "$status" = "200" ] && exit 0
            sleep 10
          done
          echo "::error::Node API health check failed after deploy — consider rollback"
          exit 1

  # Python deployment - Re-enabled for Advanced Analysis & Templates
  deploy-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: apps/backend-python/requirements.txt
      - name: Install dependencies
        working-directory: apps/backend-python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Create zip package
        working-directory: apps/backend-python
        run: |
          zip -r ../../python-app.zip . \
            -x "*.venv/*" "venv/*" "__pycache__/*" "*.pyc" ".pytest_cache/*" "tests/*"

      - name: Deploy to Azure Web App (publish profile)
        id: deploy_python_publish_profile
        continue-on-error: true
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME_PYTHON }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PYTHON }}
          package: python-app.zip

      - name: Azure login for Python fallback deploy
        id: python_fallback_login
        if: steps.deploy_python_publish_profile.outcome != 'success'
        continue-on-error: true
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure Python app startup (fallback path)
        if: steps.deploy_python_publish_profile.outcome != 'success' && steps.python_fallback_login.outcome == 'success'
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp config appsettings set \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --name "${{ env.AZURE_WEBAPP_NAME_PYTHON }}" \
              --settings SCM_DO_BUILD_DURING_DEPLOYMENT=true ENABLE_ORYX_BUILD=true PORT=8000 WEBSITES_PORT=8000
            az webapp config set \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --name "${{ env.AZURE_WEBAPP_NAME_PYTHON }}" \
              --startup-file "bash startup.sh"

      - name: Deploy Python via Azure CLI fallback
        id: deploy_python_cli_fallback
        if: steps.deploy_python_publish_profile.outcome != 'success' && steps.python_fallback_login.outcome == 'success'
        continue-on-error: true
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp deploy \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --name "${{ env.AZURE_WEBAPP_NAME_PYTHON }}" \
              --src-path python-app.zip \
              --type zip \
              --clean true

      - name: Fail with actionable Python deployment guidance
        if: steps.deploy_python_publish_profile.outcome != 'success' && steps.deploy_python_cli_fallback.outcome != 'success'
        run: |
          echo "::error::Python deployment failed via both publish-profile and Azure CLI fallback."
          echo "::error::Rotate AZURE_WEBAPP_PUBLISH_PROFILE_PYTHON and verify AZURE_CREDENTIALS has Contributor on ${{ env.AZURE_RESOURCE_GROUP }}."
          exit 1

      - name: Verify Python API health post-deploy
        run: |
          echo "Waiting 20s for service warm-up..."
          sleep 20
          for i in 1 2 3 4 5; do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://beamlab-backend-python.azurewebsites.net/health || echo "000")
            echo "Attempt $i: Python API → $status"
            [ "$status" = "200" ] && exit 0
            sleep 10
          done
          echo "::error::Python API health check failed after deploy — consider rollback"
          exit 1

  # Frontend is deployed via the separate Azure Static Web Apps CI/CD workflow
  # (azure-static-web-apps-brave-mushroom-0eae8ec00.yml) which includes
  # Rust WASM build steps. No need to duplicate it here.

  # Build and deploy Rust API (Container)
  deploy-rust:
    runs-on: ubuntu-latest
    # Removed dependency on deploy-api/deploy-python so rust deploys independently
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: beamlabregistry.azurecr.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/rust-api
          push: true
          tags: |
            beamlabregistry.azurecr.io/beamlab-rust:latest
            beamlabregistry.azurecr.io/beamlab-rust:${{ github.sha }}
            
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: beamlab-rust-api
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_RUST }}
          images: 'beamlabregistry.azurecr.io/beamlab-rust:latest'

  # =========================================================================
  # POST-DEPLOY SMOKE TEST
  # =========================================================================
  smoke-test:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-python, deploy-rust]
    if: always() && (needs.deploy-api.result == 'success' || needs.deploy-python.result == 'success')
    timeout-minutes: 5
    steps:
      - name: Wait for services to warm up
        run: sleep 30

      - name: Check Node.js API health
        run: |
          for i in 1 2 3; do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://beamlab-backend-node.azurewebsites.net/health || echo "000")
            echo "Attempt $i: Node API → $status"
            [ "$status" = "200" ] && break
            sleep 10
          done
          [ "$status" = "200" ] || { echo "::error::Node API health check failed (status: $status)"; exit 1; }

      - name: Check Python API health
        run: |
          for i in 1 2 3; do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://beamlab-backend-python.azurewebsites.net/health || echo "000")
            echo "Attempt $i: Python API → $status"
            [ "$status" = "200" ] && break
            sleep 10
          done
          [ "$status" = "200" ] || { echo "::error::Python API health check failed (status: $status)"; exit 1; }

      - name: Check Rust API health
        run: |
          for i in 1 2 3; do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://beamlab-rust-api.azurewebsites.net/health || echo "000")
            echo "Attempt $i: Rust API → $status"
            [ "$status" = "200" ] && break
            sleep 10
          done
          [ "$status" = "200" ] || { echo "::warning::Rust API health check failed (status: $status)"; }

      - name: Check Frontend
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" https://beamlabultimate.tech || echo "000")
          echo "Frontend → $status"
          [ "$status" = "200" ] || { echo "::warning::Frontend health check returned $status"; }

      - name: Summary
        run: echo "Post-deploy smoke tests complete ✅"
