name: Lighthouse CI

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/web/**'
      - 'budget.json'
  workflow_dispatch:

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  lighthouse:
    name: Performance Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter web build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY || 'pk_test_placeholder' }}

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .github/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

  bundle-size:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter web build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY || 'pk_test_placeholder' }}

      - name: Check bundle sizes against budget
        run: |
          echo "=== Bundle Size Report ==="
          # Check JS bundles
          total_js=$(find apps/web/dist -name '*.js' -exec gzip -c {} \; | wc -c)
          total_css=$(find apps/web/dist -name '*.css' -exec gzip -c {} \; | wc -c)
          echo "Total JS (gzip): $(echo "scale=1; $total_js / 1024" | bc) KB"
          echo "Total CSS (gzip): $(echo "scale=1; $total_css / 1024" | bc) KB"
          # Enforce limits from budget.json
          js_limit=512000  # 500 KB gzip
          css_limit=102400 # 100 KB gzip
          fail=0
          if [ "$total_js" -gt "$js_limit" ]; then
            echo "::error::JS bundle exceeds 500 KB gzip limit ($(echo "scale=1; $total_js / 1024" | bc) KB)"
            fail=1
          fi
          if [ "$total_css" -gt "$css_limit" ]; then
            echo "::error::CSS bundle exceeds 100 KB gzip limit ($(echo "scale=1; $total_css / 1024" | bc) KB)"
            fail=1
          fi
          if [ "$fail" -eq 1 ]; then exit 1; fi
          echo "✓ All bundles within budget"
