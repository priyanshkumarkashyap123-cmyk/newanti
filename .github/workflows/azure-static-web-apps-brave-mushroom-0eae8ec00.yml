name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-frontend-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Load SWA token from .env.deploy when repository is private
        id: load_env_deploy
        run: |
          is_private=$(curl -s -H "Authorization: token $GITHUB_TOKEN" https://api.github.com/repos/${{ github.repository }} | jq -r .private)

          normalize_value() {
            local raw="$1"
            if [[ "$raw" =~ ^\'.*\'$ ]]; then
              raw="${raw:1:${#raw}-2}"
            elif [[ "$raw" =~ ^\".*\"$ ]]; then
              raw="${raw:1:${#raw}-2}"
            fi
            printf '%s' "$raw"
          }

          if [ "$is_private" = "true" ] && [ -f .env.deploy ]; then
            value=$(grep -E '^AZURE_STATIC_WEB_APPS_API_TOKEN=' .env.deploy | head -n1 | cut -d'=' -f2- || true)
            value="$(normalize_value "$value")"
            if [ -n "$value" ]; then
              echo "SWA_TOKEN=$value" >> $GITHUB_ENV
              printf '%s\n' "swa_token<<EOF" >> $GITHUB_OUTPUT
              printf '%s\n' "$value" >> $GITHUB_OUTPUT
              printf '%s\n' "EOF" >> $GITHUB_OUTPUT
              echo "Loaded SWA token from .env.deploy"
            else
              echo "swa_token=" >> $GITHUB_OUTPUT
              echo "No SWA token found in .env.deploy"
            fi
          else
            echo "swa_token=" >> $GITHUB_OUTPUT
            echo "Skipping .env.deploy token load (repo public or file missing)"
          fi
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust/WASM build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/backend-rust
            packages/solver-wasm
      
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build Backend Rust WASM
        continue-on-error: true
        working-directory: apps/backend-rust
        run: |
          wasm-pack build --target web --out-dir ./pkg --release
          ls -la pkg/

      - name: Build Solver WASM
        continue-on-error: true
        working-directory: packages/solver-wasm
        run: |
          wasm-pack build --target web --out-dir ./pkg --release
          ls -la pkg/
      
      - name: Verify WASM packages exist
        continue-on-error: true
        run: |
          echo "Checking backend-rust WASM..."
          test -f apps/backend-rust/pkg/backend_rust_bg.wasm || { echo "::error::Missing backend_rust_bg.wasm"; exit 1; }
          echo "Checking solver-wasm WASM..."
          test -f packages/solver-wasm/pkg/solver_wasm_bg.wasm || { echo "::error::Missing solver_wasm_bg.wasm"; exit 1; }
          echo "WASM artifacts verified ✅"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Frontend
        working-directory: apps/web
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
          VITE_API_URL: https://beamlab-backend-node-prod.azurewebsites.net
          VITE_PYTHON_API_URL: https://beamlab-backend-python-prod.azurewebsites.net
          VITE_RUST_API_URL: https://beamlab-rust-api-prod.azurewebsites.net
          VITE_WEBSOCKET_URL: wss://beamlab-backend-python-prod.azurewebsites.net/ws
          VITE_USE_CLERK: "true"
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_RAZORPAY_KEY_ID: ${{ secrets.VITE_RAZORPAY_KEY_ID }}
          VITE_PHONEPE_MERCHANT_ID: ${{ secrets.PHONEPE_MERCHANT_ID }}
          VITE_PHONEPE_ENV: PRODUCTION
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_ENABLE_PERFORMANCE_METRICS: "true"
          VITE_TEMP_UNLOCK_ALL: "false"
          VITE_FORCE_PAYMENT_TEST_MODE: "false"
        run: pnpm run build

      - name: Deploy to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.load_env_deploy.outputs.swa_token != '' && steps.load_env_deploy.outputs.swa_token || secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "apps/web/dist"
          skip_app_build: true
          skip_api_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
          app_location: "apps/web/dist"
