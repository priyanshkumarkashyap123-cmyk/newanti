name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-frontend-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust/WASM build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/backend-rust
            packages/solver-wasm
      
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build Backend Rust WASM
        working-directory: apps/backend-rust
        run: |
          wasm-pack build --target web --out-dir ./pkg --release
          ls -la pkg/

      - name: Build Solver WASM
        working-directory: packages/solver-wasm
        run: |
          wasm-pack build --target web --out-dir ./pkg --release
          ls -la pkg/
      
      - name: Verify WASM packages exist
        run: |
          echo "Checking backend-rust WASM..."
          test -f apps/backend-rust/pkg/backend_rust_bg.wasm || { echo "::error::Missing backend_rust_bg.wasm"; exit 1; }
          echo "Checking solver-wasm WASM..."
          test -f packages/solver-wasm/pkg/solver_wasm_bg.wasm || { echo "::error::Missing solver_wasm_bg.wasm"; exit 1; }
          echo "WASM artifacts verified ✅"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Frontend
        working-directory: apps/web
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
          VITE_API_URL: https://beamlab-backend-node.azurewebsites.net
          VITE_PYTHON_API_URL: https://beamlab-backend-python.azurewebsites.net
          VITE_RUST_API_URL: https://beamlab-rust-api.azurewebsites.net
          VITE_WEBSOCKET_URL: wss://beamlab-backend-node.azurewebsites.net
          VITE_USE_CLERK: "true"
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_RAZORPAY_KEY_ID: ${{ secrets.VITE_RAZORPAY_KEY_ID }}
          VITE_PHONEPE_MERCHANT_ID: ${{ secrets.PHONEPE_MERCHANT_ID }}
          VITE_PHONEPE_ENV: PRODUCTION
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_ENABLE_PERFORMANCE_METRICS: "true"
          VITE_TEMP_UNLOCK_ALL: "false"
          VITE_FORCE_PAYMENT_TEST_MODE: "false"
        run: pnpm run build

      - name: Deploy to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "apps/web/dist"
          skip_app_build: true
          skip_api_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
          app_location: "apps/web/dist"
