name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          override: true
      
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM Solver Package
        working-directory: packages/solver-wasm
        run: |
          wasm-pack build --target web
          ls -la pkg/
      
      - name: Build Backend Rust WASM
        working-directory: apps/backend-rust
        run: |
          wasm-pack build --target web --out-dir ./pkg --release
          ls -la pkg/
      
      - name: Verify WASM packages exist
        run: |
          echo "Checking solver-wasm pkg..."
          ls -la packages/solver-wasm/pkg/
          echo "Checking backend-rust pkg..."
          ls -la apps/backend-rust/pkg/

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Frontend
        working-directory: apps/web
        env:
          VITE_API_URL: https://beamlab-backend-node.azurewebsites.net
          VITE_PYTHON_API_URL: https://beamlab-backend-python.azurewebsites.net
          VITE_USE_CLERK: "true"
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
        run: pnpm run build

      - name: Deploy to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "apps/web/dist"
          output_location: ""
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
          app_location: "apps/web/dist"
