name: Deploy to Azure (Self-Hosted)

# This workflow uses a self-hosted runner to avoid using GitHub Actions minutes
# Setup instructions: See GITHUB_ACTIONS_ALTERNATE_ACCOUNT_SETUP.md

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME_API: beamlab-backend-node
  AZURE_WEBAPP_NAME_PYTHON: beamlab-backend-python
  NODE_VERSION: '20.x'
  PYTHON_VERSION: '3.11'

jobs:
  # Build and deploy Node.js API
  deploy-api:
    runs-on: self-hosted  # ← Uses your own machine
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build API
        working-directory: apps/api
        run: pnpm run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy-api
          cp -r apps/api/dist deploy-api/
          node -e "
            const pkg = require('./apps/api/package.json');
            delete pkg.scripts.build;
            delete pkg.devDependencies;
            pkg.scripts.start = 'node dist/index.js';
            pkg.main = 'dist/index.js';
            console.log(JSON.stringify(pkg, null, 2));
          " > deploy-api/package.json
          cd deploy-api && npm install --omit=dev --ignore-scripts
          zip -r ../api-app.zip .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME_API }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_API }}
          package: api-app.zip

  # Build and deploy Python backend
  deploy-python:
    runs-on: self-hosted  # ← Uses your own machine
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: apps/backend-python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare deployment package
        working-directory: apps/backend-python
        run: |
          mkdir -p ../deploy-python
          cp -r . ../deploy-python/
          cd ../deploy-python
          zip -r ../../python-app.zip .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME_PYTHON }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_PYTHON }}
          package: python-app.zip
