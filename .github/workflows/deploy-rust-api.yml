name: Deploy Rust API to Azure

# Superseded by .github/workflows/azure-deploy.yml for automatic deployments.
# Kept as a manual fallback workflow only.
on:
  workflow_dispatch:

concurrency:
  group: deploy-rust-api
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Load .env.deploy when repository is private
        id: load_env_deploy
        run: |
          is_private=$(curl -s -H "Authorization: token ${{ github.token }}" https://api.github.com/repos/${{ github.repository }} | jq -r .private)

          normalize_value() {
            local raw="$1"
            if [[ "$raw" =~ ^\'.*\'$ ]]; then
              raw="${raw:1:${#raw}-2}"
            elif [[ "$raw" =~ ^\".*\"$ ]]; then
              raw="${raw:1:${#raw}-2}"
            fi
            printf '%s' "$raw"
          }

          if [ "$is_private" = "true" ] && [ -f .env.deploy ]; then
            for key in REGISTRY_USERNAME REGISTRY_PASSWORD AZURE_WEBAPP_PUBLISH_PROFILE_RUST AZURE_PUBLISH_PROFILE_RUST AZURE_CREDENTIALS; do
              value=$(grep -E "^${key}=" .env.deploy | head -n1 | cut -d'=' -f2- || true)
              value="$(normalize_value "$value")"
              if [ -n "$value" ]; then
                echo "$key=$value" >> $GITHUB_ENV
              fi
            done
          fi

      - name: Prepare normalized deploy credentials
        id: prep_credentials
        env:
          SECRET_REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          SECRET_REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          SECRET_AZURE_PUBLISH_PROFILE_RUST: ${{ secrets.AZURE_PUBLISH_PROFILE_RUST }}
          SECRET_AZURE_WEBAPP_PUBLISH_PROFILE_RUST: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_RUST }}
          SECRET_AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          normalize_outer_quotes() {
            local raw="$1"
            if [[ "$raw" =~ ^\'.*\'$ ]]; then
              raw="${raw:1:${#raw}-2}"
            elif [[ "$raw" =~ ^\".*\"$ ]]; then
              raw="${raw:1:${#raw}-2}"
            fi
            printf '%s' "$raw"
          }

          REGISTRY_USERNAME_RAW="${REGISTRY_USERNAME:-$SECRET_REGISTRY_USERNAME}"
          REGISTRY_PASSWORD_RAW="${REGISTRY_PASSWORD:-$SECRET_REGISTRY_PASSWORD}"
          PUBLISH_PROFILE_RAW="${AZURE_WEBAPP_PUBLISH_PROFILE_RUST:-${AZURE_PUBLISH_PROFILE_RUST:-${SECRET_AZURE_WEBAPP_PUBLISH_PROFILE_RUST:-$SECRET_AZURE_PUBLISH_PROFILE_RUST}}}"
          AZ_CREDS_RAW="${AZURE_CREDENTIALS:-$SECRET_AZURE_CREDENTIALS}"

          REGISTRY_USERNAME_CLEAN="$(normalize_outer_quotes "$REGISTRY_USERNAME_RAW")"
          REGISTRY_PASSWORD_CLEAN="$(normalize_outer_quotes "$REGISTRY_PASSWORD_RAW")"
          PUBLISH_PROFILE_CLEAN="$(normalize_outer_quotes "$PUBLISH_PROFILE_RAW")"
          AZ_CREDS_CLEAN="$(normalize_outer_quotes "$AZ_CREDS_RAW")"

          echo "registry_username=$REGISTRY_USERNAME_CLEAN" >> $GITHUB_OUTPUT
          printf '%s\n' "registry_password<<EOF" >> $GITHUB_OUTPUT
          printf '%s\n' "$REGISTRY_PASSWORD_CLEAN" >> $GITHUB_OUTPUT
          printf '%s\n' "EOF" >> $GITHUB_OUTPUT
          printf '%s\n' "publish_profile<<EOF" >> $GITHUB_OUTPUT
          printf '%s\n' "$PUBLISH_PROFILE_CLEAN" >> $GITHUB_OUTPUT
          printf '%s\n' "EOF" >> $GITHUB_OUTPUT

          if [ -n "$AZ_CREDS_CLEAN" ] && echo "$AZ_CREDS_CLEAN" | jq -e . >/dev/null 2>&1; then
            echo "creds_valid=true" >> $GITHUB_OUTPUT
            printf '%s\n' "creds<<EOF" >> $GITHUB_OUTPUT
            printf '%s\n' "$AZ_CREDS_CLEAN" >> $GITHUB_OUTPUT
            printf '%s\n' "EOF" >> $GITHUB_OUTPUT
          else
            echo "creds_valid=false" >> $GITHUB_OUTPUT
            echo "creds=" >> $GITHUB_OUTPUT
          fi

      - name: Azure Login
        id: az_login
        if: steps.prep_credentials.outputs.creds_valid == 'true'
        continue-on-error: true
        uses: azure/login@v1
        with:
          creds: ${{ steps.prep_credentials.outputs.creds }}

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: beamlabregistry.azurecr.io
          username: ${{ steps.prep_credentials.outputs.registry_username }}
          password: ${{ steps.prep_credentials.outputs.registry_password }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend/rust-api
          push: true
          tags: |
            beamlabregistry.azurecr.io/beamlab-rust:latest
            beamlabregistry.azurecr.io/beamlab-rust:${{ github.sha }}

      - name: Deploy Rust container via Azure CLI
        if: steps.az_login.conclusion == 'success'
        run: |
          az webapp config container set \
            --resource-group beamlab-ci-rg \
            --name beamlab-rust-api \
            --docker-custom-image-name beamlabregistry.azurecr.io/beamlab-rust:latest \
            --docker-registry-server-url https://beamlabregistry.azurecr.io \
            --docker-registry-server-user "${{ steps.prep_credentials.outputs.registry_username }}" \
            --docker-registry-server-password "${{ steps.prep_credentials.outputs.registry_password }}"

          az webapp restart --resource-group beamlab-ci-rg --name beamlab-rust-api

      - name: Deploy to Azure Web App (publish-profile fallback)
        if: steps.az_login.conclusion != 'success'
        continue-on-error: true
        uses: azure/webapps-deploy@v3
        with:
          app-name: beamlab-rust-api
          publish-profile: ${{ steps.prep_credentials.outputs.publish_profile }}
          images: 'beamlabregistry.azurecr.io/beamlab-rust:latest'

