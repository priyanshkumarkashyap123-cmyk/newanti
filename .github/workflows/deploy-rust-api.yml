name: Deploy Rust API to Azure

# Superseded by .github/workflows/azure-deploy.yml for automatic deployments.
# Kept as a manual fallback workflow only.
on:
  workflow_dispatch:

concurrency:
  group: deploy-rust-api
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: beamlabregistry.azurecr.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/rust-api
          push: true
          tags: |
            beamlabregistry.azurecr.io/beamlab-rust:latest
            beamlabregistry.azurecr.io/beamlab-rust:${{ github.sha }}
      
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: beamlab-rust-api
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_RUST }}
          images: 'beamlabregistry.azurecr.io/beamlab-rust:latest'

