name: E2E Tests & Bundle Analysis

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'
  workflow_dispatch:
    inputs:
      test_user_email:
        description: 'Optional test user email for authenticated E2E flows'
        required: false
        type: string
      test_user_password:
        description: 'Optional test user password for authenticated E2E flows'
        required: false
        type: string
  schedule:
    - cron: '0 2 * * 0'  # Weekly Sunday 2 AM UTC

env:
  CI: true
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 0

jobs:
  # ============================================================================
  # E2E Tests with Playwright
  # ============================================================================
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    strategy:
      fail-fast: false
      matrix:
        # PRs: chromium only (fast). Weekly/manual: all browsers.
        browser: ${{ github.event_name == 'pull_request' && fromJson('["chromium"]') || fromJson('["chromium", "firefox", "webkit"]') }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
          
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
        
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
            
      - name: Install dependencies
        run: pnpm install
        
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps ${{ matrix.browser }}
        working-directory: apps/web
        
      - name: Build application
        run: pnpm build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY || 'pk_test_placeholder' }}
          
      - name: Run E2E tests
        run: pnpm test:e2e --project=${{ matrix.browser }}
        working-directory: apps/web
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173
          # Prefer repository secrets (CI/PR runs); fall back to dispatch inputs (manual runs).
          # Tests that require auth use test.skip(!HAS_E2E_AUTH, ...) so they degrade gracefully
          # when neither is set.
          TEST_USER_EMAIL: ${{ github.event.inputs.test_user_email }}
          TEST_USER_PASSWORD: ${{ github.event.inputs.test_user_password }}
          
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: apps/web/playwright-report/
          retention-days: 14
          
      - name: Upload Test Screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots-${{ matrix.browser }}
          path: apps/web/test-results/
          retention-days: 7

  # ============================================================================
  # Bundle Analysis
  # ============================================================================
  bundle-analysis:
    name: Bundle Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
          
      - name: Install dependencies
        run: pnpm install
        
      - name: Build application
        run: pnpm build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY || 'pk_test_placeholder' }}
          
      - name: Analyze bundle
        run: node scripts/analyze-bundle.js

      - name: Generate visual bundle report
        run: pnpm --dir apps/web analyze:visual
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY || 'pk_test_placeholder' }}
        
      - name: Upload bundle stats
        uses: actions/upload-artifact@v4
        with:
          name: bundle-stats
          path: apps/web/dist/
          retention-days: 7

      - name: Upload bundle visualizer report
        uses: actions/upload-artifact@v4
        with:
          name: bundle-visualizer
          path: apps/web/dist/stats.html
          retention-days: 14

  # ============================================================================
  # Accessibility Audit
  # ============================================================================
  accessibility:
    name: Accessibility Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
          
      - name: Install dependencies
        run: pnpm install
        
      - name: Install Playwright
        run: pnpm exec playwright install chromium
        working-directory: apps/web
        
      - name: Build application
        run: pnpm build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY || 'pk_test_placeholder' }}
          
      - name: Run accessibility tests
        run: pnpm test:e2e --project=chromium e2e/accessibility.spec.ts
        working-directory: apps/web
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173

  # ============================================================================
  # Performance Tests
  # ============================================================================
  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
          
      - name: Install dependencies
        run: pnpm install
        
      - name: Install Playwright
        run: pnpm exec playwright install chromium
        working-directory: apps/web
        
      - name: Build application
        run: pnpm build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY || 'pk_test_placeholder' }}
          
      - name: Run performance tests
        run: pnpm test:e2e --project=chromium e2e/performance.spec.ts
        working-directory: apps/web
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173
