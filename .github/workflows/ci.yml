name: CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # =========================================================================
  # TYPECHECK - TypeScript compilation check
  # =========================================================================
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'pnpm'
    - run: pnpm install --frozen-lockfile
    - name: Run TypeScript Check (Web)
      run: pnpm --filter @beamlab/web type-check
    - name: Run TypeScript Check (API)
      working-directory: apps/api
      run: npx tsc --noEmit

  # =========================================================================
  # LINT - ESLint code quality
  # =========================================================================
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'pnpm'
    - run: pnpm install --frozen-lockfile
    - name: Run ESLint
      run: pnpm lint

  # =========================================================================
  # WEB BROWSER COMPATIBILITY CHECK
  # Fast-fail guard for browser-incompatible Node/CommonJS patterns in web src
  # =========================================================================
  web-browser-compat:
    name: Web Browser Compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v4
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'pnpm'
    - run: pnpm install --frozen-lockfile
    - name: Run Browser Compatibility Guard
      run: pnpm --filter @beamlab/web run check:browser-compat

  # =========================================================================
  # WEB BUILD AND TEST
  # =========================================================================
  web-build-and-test:
    runs-on: ubuntu-latest
    needs: [lint, web-browser-compat]
    timeout-minutes: 20
    
    defaults:
      run:
        working-directory: ./apps/web

    steps:
    - uses: actions/checkout@v4
    
    - name: Install pnpm
      uses: pnpm/action-setup@v4

    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'pnpm'

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown

    - name: Cache Rust/WASM build artifacts
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: |
          apps/backend-rust
          packages/solver-wasm

    - name: Install wasm-pack
      run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

    - name: Build Backend Rust WASM
      working-directory: apps/backend-rust
      run: wasm-pack build --target web --out-dir ./pkg --release

    - name: Build Solver WASM
      working-directory: packages/solver-wasm
      run: wasm-pack build --target web --out-dir ./pkg --release

    - name: Install Dependencies
      run: pnpm install --frozen-lockfile

    - name: Build
      run: pnpm run build
      env:
        NODE_OPTIONS: "--max-old-space-size=4096"
        VITE_CLERK_PUBLISHABLE_KEY: "pk_test_mock"
        VITE_API_URL: "http://localhost:3000"

    - name: Run Unit Tests
      run: pnpm run test:run

  # =========================================================================
  # REGRESSION TESTS - Structural analysis regression
  # =========================================================================
  regression:
    name: Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'pnpm'
    - run: pnpm install --frozen-lockfile
    - name: Run Regression Tests
      run: pnpm --filter @beamlab/web test:regression
      env:
        CI: true
        REGRESSION_TOLERANCE: 0.001

  # =========================================================================
  # RUST BACKEND CHECK
  # =========================================================================
  rust-check:
    name: Rust Backend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ./apps/backend-rust
    steps:
    - uses: actions/checkout@v4
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt
    - name: Cache Rust
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: apps/backend-rust
    - name: Cargo Check
      run: cargo check --all-features
    - name: Cargo Test
      run: cargo test --all-features

  # =========================================================================
  # BACKEND API BUILD AND TEST
  # =========================================================================
  backend-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./apps/api
    steps:
    - uses: actions/checkout@v4
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'pnpm'
    - run: pnpm install
    - run: pnpm run build
    - name: Run API Unit Tests
      run: npx vitest run

  # =========================================================================
  # BACKEND PYTHON TESTS (required)
  # Runs full backend Python tests with base dependencies.
  # =========================================================================
  backend-python-tests:
    name: Backend Python Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ./apps/backend-python
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: |
          apps/backend-python/requirements.txt
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run backend Python test suite
      run: pytest -q

  # =========================================================================
  # BACKEND PYTHON TESTS (JAX optional / non-blocking)
  # Adds optional visibility into JAX-enabled PINN test behavior.
  # =========================================================================
  backend-python-tests-jax:
    name: Backend Python Tests (JAX CPU)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true
    defaults:
      run:
        working-directory: ./apps/backend-python
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: |
          apps/backend-python/requirements.txt
          apps/backend-python/requirements-jax.txt
    - name: Install dependencies (base + JAX)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-jax.txt
    - name: Run backend Python test suite (JAX enabled)
      run: pytest -q

  # =========================================================================
  # API CONTRACT COMPATIBILITY GATE
  # Validates proxy payload contracts and migration registration integrity.
  # =========================================================================
  api-contract-compatibility:
    name: API Contract Compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./apps/api
    steps:
    - uses: actions/checkout@v4
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'pnpm'
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    - name: Migration preflight checks
      run: pnpm run migrate:preflight
    - name: Proxy contract compatibility tests
      run: pnpm run test:contracts

  # =========================================================================
  # OPENAPI CONTRACT VALIDATION
  # Ensures openapi.yaml is valid and no required responses are missing.
  # Run it on every PR and push to main — fail fast on undocumented changes.
  # =========================================================================
  contract-validation:
    name: OpenAPI Contract Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v4

    - name: Install Redocly CLI
      run: npm install -g @redocly/cli@latest

    - name: Lint OpenAPI spec
      run: redocly lint apps/api/openapi.yaml --format=github-actions

    - name: Validate spec is parseable (bundle)
      run: redocly bundle apps/api/openapi.yaml --output /tmp/bundled.yaml

    - name: Check spec contains required tags
      run: |
        for tag in health auth projects analysis ai; do
          if ! grep -q "tags: \[$tag\]" apps/api/openapi.yaml; then
            echo "❌ Missing required tag '$tag' in openapi.yaml"
            exit 1
          fi
        done
        echo "✅ All required tags present"

  # =========================================================================
  # DESIGN CONTRACT GATE
  # Enforces gateway and UI contract behavior for design flows.
  # =========================================================================
  design-contract-gate:
    name: Design Contract Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'pnpm'
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Cache Rust
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: apps/rust-api
    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: API design contract tests
      run: pnpm --dir apps/api exec vitest run tests/design-core-routes.test.ts tests/design-geotech-routes.test.ts tests/validation.test.ts

    - name: Web design contract tests
      run: pnpm --dir apps/web exec vitest run src/__tests__/pages/GeotechnicalDesignPage.test.tsx src/config/__tests__/appRouteMeta.test.ts

    - name: Web route metadata parity guard
      run: pnpm --dir apps/web test:route-parity

    - name: Web type-check
      run: pnpm --dir apps/web type-check

    - name: Rust API lib tests
      working-directory: ./apps/rust-api
      run: cargo test --lib

  # =========================================================================
  # CI STATUS SUMMARY
  # =========================================================================
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [typecheck, lint, web-browser-compat, web-build-and-test, regression, rust-check, backend-build, backend-python-tests, api-contract-compatibility, contract-validation, design-contract-gate]
    if: always()
    steps:
    - name: Check Results
      run: |
        if [[ "${{ needs.typecheck.result }}" == "failure" || \
              "${{ needs.lint.result }}" == "failure" || \
            "${{ needs.web-browser-compat.result }}" == "failure" || \
              "${{ needs.web-build-and-test.result }}" == "failure" || \
              "${{ needs.regression.result }}" == "failure" || \
              "${{ needs.rust-check.result }}" == "failure" || \
              "${{ needs.backend-build.result }}" == "failure" || \
              "${{ needs.backend-python-tests.result }}" == "failure" || \
              "${{ needs.api-contract-compatibility.result }}" == "failure" || \
              "${{ needs.contract-validation.result }}" == "failure" || \
              "${{ needs.design-contract-gate.result }}" == "failure" ]]; then
          echo "CI Pipeline Failed"
          exit 1
        else
          echo "CI Pipeline Passed ✅"
        fi


