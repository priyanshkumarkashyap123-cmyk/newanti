name: CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # =========================================================================
  # TYPECHECK - TypeScript compilation check
  # =========================================================================
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
    - uses: pnpm/action-setup@v3
      with:
        version: ${{ env.PNPM_VERSION }}
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'pnpm'
    - run: pnpm install --frozen-lockfile
    - name: Run TypeScript Check
      run: pnpm typecheck || pnpm --filter web exec tsc --noEmit

  # =========================================================================
  # LINT - ESLint code quality
  # =========================================================================
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
    - uses: pnpm/action-setup@v3
      with:
        version: ${{ env.PNPM_VERSION }}
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'pnpm'
    - run: pnpm install --frozen-lockfile
    - name: Run ESLint
      run: pnpm lint
      continue-on-error: true

  # =========================================================================
  # WEB BUILD AND TEST
  # =========================================================================
  web-build-and-test:
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    timeout-minutes: 20
    
    defaults:
      run:
        working-directory: ./apps/web

    steps:
    - uses: actions/checkout@v4
    
    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: ${{ env.PNPM_VERSION }}

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'pnpm'

    - name: Install Dependencies
      run: pnpm install

    - name: Build
      run: pnpm run build
      env:
        NODE_OPTIONS: "--max-old-space-size=4096"
        VITE_CLERK_PUBLISHABLE_KEY: "pk_test_mock"
        VITE_API_URL: "http://localhost:3000"

    - name: Run Unit Tests
      run: pnpm run test:run

  # =========================================================================
  # REGRESSION TESTS - Structural analysis regression
  # =========================================================================
  regression:
    name: Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
    - uses: pnpm/action-setup@v3
      with:
        version: ${{ env.PNPM_VERSION }}
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'pnpm'
    - run: pnpm install --frozen-lockfile
    - name: Run Regression Tests
      run: pnpm test:regression || pnpm test -- --grep "regression"
      env:
        CI: true
        REGRESSION_TOLERANCE: 0.001

  # =========================================================================
  # RUST BACKEND CHECK
  # =========================================================================
  rust-check:
    name: Rust Backend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ./apps/backend-rust
    steps:
    - uses: actions/checkout@v4
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt
    - name: Cache Rust
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: apps/backend-rust
    - name: Cargo Check
      run: cargo check --all-features
    - name: Cargo Test
      run: cargo test --all-features

  # =========================================================================
  # BACKEND API BUILD
  # =========================================================================
  backend-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./apps/api
    steps:
    - uses: actions/checkout@v4
    - uses: pnpm/action-setup@v3
      with:
        version: ${{ env.PNPM_VERSION }}
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'pnpm'
    - run: pnpm install
    - run: pnpm run build

  # =========================================================================
  # CI STATUS SUMMARY
  # =========================================================================
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [typecheck, lint, web-build-and-test, rust-check, backend-build]
    if: always()
    steps:
    - name: Check Results
      run: |
        if [[ "${{ needs.typecheck.result }}" == "failure" || \
              "${{ needs.web-build-and-test.result }}" == "failure" || \
              "${{ needs.rust-check.result }}" == "failure" ]]; then
          echo "CI Pipeline Failed"
          exit 1
        else
          echo "CI Pipeline Passed ✅"
        fi

