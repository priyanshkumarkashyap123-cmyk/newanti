[package]
name = "solver-wasm"
version = "0.1.0"
authors = ["BeamLab Team"]
edition = "2021"
description = "High-performance WebAssembly linear solver for structural analysis"
repository = "https://github.com/beamlab/solver-wasm"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["console_error_panic_hook"]

[dependencies]
# WebAssembly bindings
wasm-bindgen = "0.2.92"

# Error handling for panic messages in browser console
console_error_panic_hook = { version = "0.1.7", optional = true }

# Linear algebra - nalgebra with WASM support
nalgebra = { version = "0.32", features = ["serde-serialize"] }

# Sparse matrix support
nalgebra-sparse = "0.9"

# Parallel processing - Rayon for multi-threading
rayon = "1.8"

# Advanced structural analysis - Petgraph for connectivity
petgraph = "0.6"
clarabel = "0.5"
uuid = { version = "1.0", features = ["v4", "js"] }
getrandom = { version = "0.2", features = ["js"] }
wasm-bindgen-futures = "0.4"

# JavaScript interop
js-sys = "0.3.69"

# WebGPU support
wgpu = { version = "0.19", features = ["webgl"] }

# Serialization for data transfer
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde-wasm-bindgen = "0.6"

# WASM-compatible timing
instant = { version = "0.1", features = ["wasm-bindgen"] }

# Web APIs
web-sys = { version = "0.3.69", features = [
    "console",
    "Performance",
    "Window",
    "Document",
    "Element",
    "HtmlCanvasElement",
    "Gpu",
    "GpuAdapter",
    "GpuDevice",
    "GpuQueue",
    "GpuCanvasContext"
]}

[dev-dependencies]
wasm-bindgen-test = "0.3.42"

[profile.release]
# Optimize for size while keeping speed
opt-level = 3
lto = true

# Memory settings
[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-O3", "-g"]
