# ============================================
# UPSTREAM POOLS WITH KEEPALIVE
# Reusing backend TCP connections cuts latency and CPU at 10K+ users.
# keepalive = max idle connections held per worker.
# ============================================
upstream api_node_upstream {
    server api-node:3001;
    keepalive 64;
}
upstream python_upstream {
    server backend-python:8000;
    keepalive 32;
}
upstream rust_upstream {
    server rust-api:8080;
    keepalive 32;
}

# ============================================
# CORS ORIGIN ALLOWLIST
# ============================================
# Only these origins are reflected back for CORS with credentials.
# Add new deployment/preview domains here as needed.
map $http_origin $cors_origin {
    default                                "";
    "~^https://beamlabultimate\.tech$"     $http_origin;
    "~^https://www\.beamlabultimate\.tech$" $http_origin;
    "~^https://.*\.beamlabultimate\.tech$"  $http_origin;
    "~^https://.*\.azurestaticapps\.net$"   $http_origin;
    "~^http://localhost(:[0-9]+)?$"         $http_origin;
    "~^http://127\.0\.0\.1(:[0-9]+)?$"     $http_origin;
}

# ============================================
# PRODUCTION: Rate limiting zones
# ============================================
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_analysis:10m rate=2r/s;
limit_req_zone $binary_remote_addr zone=static_assets:10m rate=100r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ============================================
    # PRODUCTION TUNING FOR 10K+ CONCURRENT USERS
    # ============================================
    
    # Connection limits (prevent single IP from hogging connections)
    limit_conn conn_limit 50;
    
    # Client body/header limits (prevent large payload attacks)
    client_max_body_size 10m;
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;
    
    # Timeouts — keep short to free connections quickly under load
    client_body_timeout 30s;
    client_header_timeout 30s;
    send_timeout 30s;
    keepalive_timeout 65s;
    keepalive_requests 1000;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 '{"status":"ok","version":"2.1.0"}';
        add_header Content-Type application/json;
    }

    # ============================================
    # CORS CONFIGURATION (centralised at gateway)
    # ============================================
    # Allowed origins – the SPA itself plus any preview / staging domains.
    # Using a map keeps the location blocks clean.
    # NOTE: Update $cors_allowed_origin below if you add new deployment domains.

    # Python API proxy (analysis, AI, design routes)
    location /api/python/ {
        # Rate limit API requests
        limit_req zone=api_analysis burst=5 nodelay;
        
        # --- CORS ---
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'  '$cors_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Request-Id, sentry-trace, baggage' always;
            add_header 'Access-Control-Max-Age' '86400' always;
            add_header 'Content-Length' '0';
            add_header 'Content-Type' 'text/plain';
            return 204;
        }
        add_header 'Access-Control-Allow-Origin'  '$cors_origin' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        proxy_pass http://python_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";  # Required for upstream keepalive
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 32k;
    }

    # Rust API proxy (high-performance analysis, advanced endpoints)
    location /api/rust/ {
        # Rate limit API requests
        limit_req zone=api_analysis burst=5 nodelay;
        
        # --- CORS ---
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'  '$cors_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Request-Id, sentry-trace, baggage' always;
            add_header 'Access-Control-Max-Age' '86400' always;
            add_header 'Content-Length' '0';
            add_header 'Content-Type' 'text/plain';
            return 204;
        }
        add_header 'Access-Control-Allow-Origin'  '$cors_origin' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        proxy_pass http://rust_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";  # Required for upstream keepalive
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 32k;
    }

    # Node API proxy (auth, payments, legacy endpoints)
    location /api/ {
        # Rate limit API requests
        limit_req zone=api_general burst=20 nodelay;
        
        # --- CORS ---
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'  '$cors_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Request-Id, sentry-trace, baggage' always;
            add_header 'Access-Control-Max-Age' '86400' always;
            add_header 'Content-Length' '0';
            add_header 'Content-Type' 'text/plain';
            return 204;
        }
        add_header 'Access-Control-Allow-Origin'  '$cors_origin' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        proxy_pass http://api_node_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";  # Required for upstream keepalive
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 32k;
    }

    # WebSocket for collaboration (Python backend)
    location /ws/ {
        proxy_pass http://python_upstream/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Static assets with caching
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Font files with long cache
    location ~* \.(woff2?|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Image files with cache
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # WASM files
    location ~* \.wasm$ {
        types { application/wasm wasm; }
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Cross-Origin-Embedder-Policy require-corp;
        add_header Cross-Origin-Opener-Policy same-origin;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    # Content Security Policy
    # NOTE: 'unsafe-inline' is required for Vite's injected styles and Clerk's auth UI.
    #        To remove it, integrate vite-plugin-csp for nonce-based script/style loading.
    # NOTE: 'unsafe-eval' and 'wasm-unsafe-eval' are required for WASM solver execution.
    # SECURITY: Gemini API (generativelanguage.googleapis.com) and Anthropic API removed
    #           from connect-src — all AI calls are now proxied through the backend.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' https://challenges.cloudflare.com https://*.clerk.accounts.dev https://*.clerk.dev https://clerk.com https://*.clerk.com https://clerk.beamlabultimate.tech https://checkout.razorpay.com https://unpkg.com blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.clerk.com https://*.clerk.dev https://*.clerk.accounts.dev https://clerk.beamlabultimate.tech; font-src 'self' https://fonts.gstatic.com https://fonts.googleapis.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://*.beamlabultimate.tech https://*.azurewebsites.net https://*.clerk.accounts.dev https://*.clerk.com https://*.clerk.dev wss://*.clerk.accounts.dev wss://clerk.beamlabultimate.tech wss://beamlab-backend-node.azurewebsites.net wss://*.azurewebsites.net https://api.razorpay.com https://lumberjack.razorpay.com https://raw.githack.com https://dl.polyhaven.org https://*.polyhaven.org https://raw.githubusercontent.com https://storage.googleapis.com https://unpkg.com; frame-src 'self' https://challenges.cloudflare.com https://*.clerk.accounts.dev https://*.clerk.com https://*.clerk.dev https://clerk.beamlabultimate.tech https://api.razorpay.com https://checkout.razorpay.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/wasm image/svg+xml;
    gzip_min_length 256;
}
