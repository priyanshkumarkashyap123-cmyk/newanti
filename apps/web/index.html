<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <!-- CSP is set via HTTP header in staticwebapp.config.json for production.
       Having BOTH a meta tag and an HTTP header causes the browser to enforce
       the INTERSECTION (most restrictive), which breaks cross-origin loads.
       Dev server CSP is in vite.config.ts securityHeaders. -->

  <!-- ============================================ -->
  <!-- CRITICAL: Preload/Preconnect for CWV        -->
  <!-- ============================================ -->
  <!-- Preconnect to critical origins -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
  <link rel="preload" href="https://fonts.gstatic.com/s/inter/v18/UcCO3FwrK3iLTeHuS_nVMrMxCp50SjIw2boKoduKmMEVuLyfAZ9hiA.woff2" crossorigin as="font" type="font/woff2" />

  <!-- Font loading via CSS @import in index.css instead of preload -->
  <!-- This avoids 404 errors and relies on browser's font-face declarations -->

  <!-- Primary Favicon - B Lettermark -->
  <link rel="icon" type="image/svg+xml" href="/branding/beamlab_icon_colored.svg" />
  <link rel="apple-touch-icon" href="/branding/beamlab_icon_colored.svg" />
  <link rel="manifest" href="/site.webmanifest" />

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" crossorigin="anonymous" media="print" onload="this.media='all'" />

  <!-- ============================================ -->
  <!-- Critical CSS (Inlined for CWV)              -->
  <!-- ============================================ -->
  <style>
    /* Critical CSS for LCP */
    :root {
      --bg-primary: #0f172a;
      --text-primary: #f8fafc;
      --accent: #3b82f6;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #root {
      min-height: 100vh;
    }

    /* Accessibility: Skip link */
    .skip-link {
      position: absolute;
      top: -40px;
      left: 0;
      background: var(--accent);
      color: white;
      padding: 8px 16px;
      z-index: 9999;
      text-decoration: none;
      font-weight: 600;
      border-radius: 0 0 4px 0;
      transition: top 0.2s;
    }

    .skip-link:focus {
      top: 0;
    }

    /* Loading skeleton for CLS prevention */
    .loading-skeleton {
      background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: -200% 0;
      }
    }

    /* Reduced motion preference */
    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    /* Font fallback to prevent FOUT */
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: local('Inter'), local('Inter-Regular');
    }
  </style>
</head>

<body>
  <!-- Skip link for keyboard users -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- Initial loading state for CLS prevention -->
  <div id="root" role="main">
    <noscript>
      <div style="padding: 2rem; text-align: center;">
        <h1>JavaScript Required</h1>
        <p>BeamLab Ultimate requires JavaScript to run. Please enable JavaScript in your browser settings.</p>
      </div>
    </noscript>
  </div>

  <!-- Main application script -->
  <script type="module" src="/src/main.tsx"></script>

  <!-- Performance monitoring -->
  <script>
    // Report Core Web Vitals to analytics
    if ('PerformanceObserver' in window) {
      // CLS
      new PerformanceObserver((list) => {
        for (const entry of list.getEntries()) {
          if (!entry.hadRecentInput) {
            console.debug('CLS:', entry.value);
          }
        }
      }).observe({ type: 'layout-shift', buffered: true });

      // LCP
      new PerformanceObserver((list) => {
        const entries = list.getEntries();
        const lastEntry = entries[entries.length - 1];
        console.debug('LCP:', lastEntry.startTime);
      }).observe({ type: 'largest-contentful-paint', buffered: true });
    }
  </script>
</body>

</html>
