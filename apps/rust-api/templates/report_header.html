<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Structural Analysis Report</title>
    <style>
        /* ============================================ */
        /* PROFESSIONAL ENGINEERING REPORT STYLESHEET */
        /* ============================================ */
        
        @page {
            size: A4;
            margin: 20mm;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', 'Helvetica', sans-serif;
            font-size: 11pt;
            line-height: 1.6;
            color: #333;
            background: white;
        }
        
        /* Cover Page */
        .cover-page {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            page-break-after: always;
        }
        
        .cover-page h1 {
            font-size: 32pt;
            font-weight: bold;
            margin-bottom: 20mm;
            color: #1a1a1a;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .cover-page h2 {
            font-size: 24pt;
            font-weight: normal;
            margin-bottom: 15mm;
            color: #444;
        }
        
        .cover-page p {
            font-size: 14pt;
            margin: 5mm 0;
            color: #666;
        }
        
        .project-number {
            font-weight: bold;
            color: #1a1a1a;
        }
        
        /* Headings */
        h1 {
            font-size: 24pt;
            font-weight: bold;
            margin: 10mm 0 5mm;
            color: #1a1a1a;
            border-bottom: 2px solid #333;
            padding-bottom: 2mm;
        }
        
        h2 {
            font-size: 18pt;
            font-weight: bold;
            margin: 8mm 0 4mm;
            color: #1a1a1a;
        }
        
        h3 {
            font-size: 14pt;
            font-weight: bold;
            margin: 6mm 0 3mm;
            color: #333;
        }
        
        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 5mm 0;
            font-size: 10pt;
        }
        
        thead {
            background: #e0e0e0;
        }
        
        thead tr {
            border-bottom: 2px solid #333;
        }
        
        th {
            padding: 3mm;
            text-align: left;
            font-weight: bold;
            color: #1a1a1a;
            background: #d0d0d0;
        }
        
        td {
            padding: 2mm 3mm;
            border-bottom: 1px solid #ddd;
        }
        
        tbody tr:hover {
            background: #f5f5f5;
        }
        
        tbody tr:nth-child(even) {
            background: #f9f9f9;
        }
        
        /* Numeric columns */
        td:nth-child(n+3) {
            text-align: right;
            font-family: 'Courier New', monospace;
        }
        
        th:nth-child(n+3) {
            text-align: right;
        }
        
        /* Design table status colors */
        .design-table .pass {
            color: #2e7d32;
            font-weight: bold;
        }
        
        .design-table .fail {
            color: #c62828;
            font-weight: bold;
        }
        
        /* Table of Contents */
        .toc {
            list-style-type: none;
            padding-left: 0;
        }
        
        .toc li {
            padding: 3mm 0;
            border-bottom: 1px dotted #ccc;
            font-size: 12pt;
        }
        
        .toc li::before {
            content: "§ ";
            font-weight: bold;
            color: #666;
        }
        
        /* Sections */
        section {
            margin: 5mm 0;
            page-break-inside: avoid;
        }
        
        section p {
            margin: 3mm 0;
        }
        
        /* Page breaks */
        .page-break {
            page-break-after: always;
        }
        
        /* Footer */
        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            text-align: center;
            font-size: 9pt;
            color: #666;
            border-top: 1px solid #ccc;
            padding-top: 2mm;
        }
        
        /* Print-specific styles */
        @media print {
            body {
                background: white;
            }
            
            .page-break {
                page-break-after: always;
            }
            
            h1, h2, h3 {
                page-break-after: avoid;
            }
            
            table {
                page-break-inside: avoid;
            }
            
            tr {
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body>
