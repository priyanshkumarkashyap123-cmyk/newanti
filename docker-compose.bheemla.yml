version: '3.9'

# ============================================
# Bheemla Ultimate - Local Development
# ============================================
# Services configured for Bheemla domain
# Access: app.bheemla.local, api.bheemla.local

services:
  # ============================================
  # Frontend - React + Vite
  # ============================================
  frontend:
    container_name: bheemla-frontend
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://api.bheemla.local:3001
      - VITE_PYTHON_API_URL=http://api.bheemla.local:3002
      - VITE_WEBSOCKET_URL=ws://api.bheemla.local:3001
      - VITE_APP_NAME=Bheemla Ultimate
      - VITE_FRONTEND_URL=http://app.bheemla.local:5173
    volumes:
      - ./apps/web/src:/app/src
      - ./apps/web/public:/app/public
    depends_on:
      - api
    networks:
      - bheemla-network
    labels:
      - "com.example.description=Bheemla Frontend App"

  # ============================================
  # Node.js API
  # ============================================
  api:
    container_name: bheemla-api
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - HOST=0.0.0.0
      - NODE_ENV=development
      - APP_NAME=Bheemla Ultimate API
      - FRONTEND_URL=http://app.bheemla.local:5173
      - ALLOWED_ORIGINS=http://app.bheemla.local:5173,http://www.bheemla.local:5173,http://localhost:5173
      - MONGODB_URI=mongodb://mongo:27017/bheemla-ultimate
      - PYTHON_API_URL=http://python-api:3002
    depends_on:
      - mongo
    volumes:
      - ./apps/api/src:/app/src
    networks:
      - bheemla-network
    labels:
      - "com.example.description=Bheemla Node.js API"

  # ============================================
  # Python API (FastAPI)
  # ============================================
  python-api:
    container_name: bheemla-python-api
    build:
      context: ./apps/backend-python
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - HOST=0.0.0.0
      - PORT=3002
      - APP_NAME=Bheemla Ultimate Python API
      - FRONTEND_URL=http://app.bheemla.local:5173
      - ALLOWED_ORIGINS=http://app.bheemla.local:5173,http://www.bheemla.local:5173,http://localhost:5173
      - USE_MOCK_AI=true
      - DEBUG=true
    volumes:
      - ./apps/backend-python/app:/app/app
    networks:
      - bheemla-network
    labels:
      - "com.example.description=Bheemla Python API"

  # ============================================
  # MongoDB Database
  # ============================================
  mongo:
    container_name: bheemla-mongo
    image: mongo:latest
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=bheemla-dev-pass
      - MONGO_INITDB_DATABASE=bheemla-ultimate
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - bheemla-network
    healthcheck:
      test: echo 'db.adminCommand("ping")' | mongosh --eval "show dbs"
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "com.example.description=Bheemla MongoDB Database"

  # ============================================
  # Redis Cache (Optional)
  # ============================================
  redis:
    container_name: bheemla-redis
    image: redis:alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass bheemla-dev-pass
    volumes:
      - redis_data:/data
    networks:
      - bheemla-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "com.example.description=Bheemla Redis Cache"

  # ============================================
  # Adminer - Database Admin UI
  # ============================================
  adminer:
    container_name: bheemla-adminer
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      - mongo
    networks:
      - bheemla-network
    environment:
      - ADMINER_DEFAULT_SERVER=mongo
    labels:
      - "com.example.description=Bheemla Database Admin"

# ============================================
# Volumes
# ============================================
volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local

# ============================================
# Networks
# ============================================
networks:
  bheemla-network:
    driver: bridge
