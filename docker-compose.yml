version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      api-node:
        condition: service_healthy
      backend-python:
        condition: service_healthy
      rust-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  backend-python:
    build:
      context: ./apps/backend-python
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - USE_MOCK_AI=true
      - FRONTEND_URL=http://localhost:5173
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3001,http://localhost:3002
      - NODE_API_URL=http://api-node:3001
      - RUST_API_URL=http://rust-api:8080
      - ENABLE_RUST_BACKEND=true
      - ANALYSIS_WORKERS=4
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

  rust-api:
    build:
      context: ./apps/rust-api
      dockerfile: Dockerfile
    ports:
      - "3002:8080"
    environment:
      - PORT=8080
      - FRONTEND_URL=http://localhost:5173
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3001,http://localhost:8000
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017/beamlab}
      - RUST_LOG=info
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  api-node:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - PYTHON_API_URL=http://backend-python:8000
      - RUST_API_URL=http://rust-api:8080
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      backend-python:
        condition: service_healthy
      rust-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  mongo-data:
