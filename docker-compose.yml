version: '3.8'

services:
  backend-python:
    build:
      context: ./apps/backend-python
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - USE_MOCK_AI=true
    volumes:
      - ./apps/backend-python:/app
    restart: always

  api-node:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
    depends_on:
      - backend-python
    restart: always
