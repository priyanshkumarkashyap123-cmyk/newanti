# ================================
# BeamLab Ultimate Docker Compose
# ================================

version: '3.8'

services:
  # API Service
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: beamlab-api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGODB_URI=mongodb://mongo:27017/beamlab
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
    depends_on:
      - mongo
    networks:
      - beamlab-network
    restart: unless-stopped

  # Web Frontend
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
        - VITE_API_URL=http://localhost:3001
    container_name: beamlab-web
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - beamlab-network
    restart: unless-stopped

  # MongoDB
  mongo:
    image: mongo:7
    container_name: beamlab-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - beamlab-network
    restart: unless-stopped

networks:
  beamlab-network:
    driver: bridge

volumes:
  mongo-data:
